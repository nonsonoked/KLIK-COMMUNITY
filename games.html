<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>KLIK COMMUNITY | Sala Giochi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Luckiest+Guy&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #a855f7;
            --accent: #d946ef;
            --success: #34d399;
            --danger: #ff4b4b;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #1a0033 0%, #05000a 100%);
            color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        .container { width: 100%; max-width: 900px; padding: 20px; text-align: center; }

        .back-link { color: var(--primary); text-decoration: none; font-weight: 800; margin-bottom: 20px; display: inline-block; transition: 0.3s; font-size: 14px; }
        .back-link:hover { color: var(--accent); transform: translateX(-5px); }

        .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { 
            padding: 10px 15px; background: var(--glass); border: 1px solid var(--glass-border); 
            border-radius: 12px; color: white; cursor: pointer; font-weight: 700; transition: 0.3s; font-size: 13px;
        }
        .tab-btn.active { background: var(--primary); border-color: var(--accent); box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }

        .game-section { display: none; }
        .game-section.active { display: block; animation: fadeIn 0.3s ease forwards; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .game-card {
            background: var(--glass); border: 1px solid var(--glass-border); 
            border-radius: 25px; padding: 20px; backdrop-filter: blur(15px); position: relative;
        }

        canvas { background: rgba(0,0,0,0.4); border-radius: 15px; border: 1px solid var(--glass-border); max-width: 100%; height: auto; }

        .btn-start {
            padding: 12px 30px; background: var(--primary); color: white; border: none;
            border-radius: 12px; font-family: 'Luckiest Guy'; font-size: 20px; cursor: pointer; margin-top: 10px;
        }

        .countdown-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 80px; font-family: 'Luckiest Guy'; color: white; z-index: 20; pointer-events: none;
        }

        .custom-select { background: #333; color: white; border: 1px solid var(--glass-border); padding: 5px; border-radius: 8px; font-weight: bold; }

        .leaderboard-card {
            margin-top: 30px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 20px; width: 100%;
        }
        .lb-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .lb-table th { color: var(--accent); font-size: 14px; text-align: left; padding: 10px; border-bottom: 1px solid var(--glass-border); }
        .lb-table td { padding: 12px 10px; font-weight: 600; text-align: left; }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-link">← TORNA ALL'HUB</a>
        <h1 style="font-family:'Luckiest Guy'; font-size: clamp(32px, 8vw, 48px); margin: 0 0 20px 0;">KLIK GAMES</h1>

        <div class="tabs">
            <button id="btn-aim" class="tab-btn active" onclick="openGame('aim')">🎯 Klik Aim</button>
            <button id="btn-jump" class="tab-btn" onclick="openGame('jump')">🚀 Klik Jump</button>
            <button id="btn-bird" class="tab-btn" onclick="openGame('bird')">🐦 Klik Bird</button>
            <button id="btn-ball" class="tab-btn" onclick="openGame('ball')">⚽ Klik Ball</button>
            <button id="btn-reaction" class="tab-btn" onclick="openGame('reaction')">⚡ Klik React</button>
        </div>

        <div id="aim" class="game-section active">
            <div class="game-card">
                <div style="font-size:18px; font-weight:800; color:var(--accent); margin-bottom:10px; display: flex; justify-content: space-around; align-items: center;">
                    <div>SCORE: <span id="aim-score">0</span></div>
                    <div>TIME: 
                        <select id="aim-duration" class="custom-select">
                            <option value="15">15s</option>
                            <option value="30" selected>30s</option>
                            <option value="60">60s</option>
                        </select>
                        <span id="aim-timer-display" style="display:none;"><span id="aim-timer">30</span>s</span>
                    </div>
                </div>
                <div id="aim-canvas-area" style="position:relative; height:350px; background:rgba(0,0,0,0.2); border-radius:20px; overflow:hidden; border:1px solid var(--glass-border);">
                    <button id="aim-start-btn" class="btn-start" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:10;" onclick="startAim()">START</button>
                    <div id="target" style="width:40px; height:40px; background:white; border-radius:50%; position:absolute; display:none; cursor:crosshair; box-shadow:0 0 15px var(--primary); z-index:5;"></div>
                </div>
            </div>
        </div>

        <div id="jump" class="game-section">
            <div class="game-card">
                <div style="margin-bottom:10px; font-weight:800; color:var(--accent);">SCORE: <span id="jump-score">0</span></div>
                <canvas id="jumpCanvas" width="400" height="500"></canvas>
                <div id="jump-ui"><button class="btn-start" onclick="startJump()">PLAY JUMP</button></div>
            </div>
        </div>

        <div id="bird" class="game-section">
            <div class="game-card">
                <div style="margin-bottom:10px; font-weight:800; color:var(--accent);">SCORE: <span id="bird-score">0</span></div>
                <div id="bird-countdown" class="countdown-overlay"></div>
                <canvas id="birdCanvas" width="400" height="500"></canvas>
                <div id="bird-ui"><button class="btn-start" onclick="prepBird()">PLAY BIRD</button></div>
            </div>
        </div>

        <div id="ball" class="game-section">
            <div class="game-card">
                <div style="margin-bottom:10px; font-weight:800; color:var(--accent);">SCORE: <span id="ball-score">0</span></div>
                <canvas id="ballCanvas" width="400" height="500"></canvas>
                <div id="ball-ui"><button class="btn-start" onclick="startBall()">PLAY BALL</button></div>
            </div>
        </div>

        <div id="reaction" class="game-section">
            <div class="game-card">
                <div id="reaction-area" style="height:250px; background:var(--primary); border-radius:20px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-weight:800; font-size:22px;" onclick="handleReaction()">CLICCA APPENA VEDI IL VERDE</div>
                <div id="reaction-result" style="margin-top:15px; font-size:24px; font-weight:800; color:var(--success);"></div>
            </div>
        </div>

        <div class="leaderboard-card">
            <h2 style="font-family:'Luckiest Guy'; color:white; margin:0;">🏆 RECORDS</h2>
            <table class="lb-table">
                <tr><th>GIOCO</th><th>RECORD</th></tr>
                <tr><td>Klik Aim</td><td id="lb-aim">0</td></tr>
                <tr><td>Klik Jump</td><td id="lb-jump">0</td></tr>
                <tr><td>Klik Bird</td><td id="lb-bird">0</td></tr>
                <tr><td>Klik Ball</td><td id="lb-ball">0</td></tr>
                <tr><td>Klik React</td><td id="lb-reaction">---</td></tr>
            </table>
        </div>
    </div>

    <img src="logo.png" id="playerLogo" style="display:none;">

    <script>
        const img = document.getElementById('playerLogo');

        // --- RECORDS ---
        function updateLB() {
            document.getElementById('lb-aim').innerText = localStorage.getItem('best-aim') || 0;
            document.getElementById('lb-jump').innerText = localStorage.getItem('best-jump') || 0;
            document.getElementById('lb-bird').innerText = localStorage.getItem('best-bird') || 0;
            document.getElementById('lb-ball').innerText = localStorage.getItem('best-ball') || 0;
            const r = localStorage.getItem('best-reaction');
            document.getElementById('lb-reaction').innerText = r ? r + "ms" : "---";
        }
        updateLB();

        function checkRecord(key, val, lowerBetter = false) {
            const old = localStorage.getItem(key);
            if(!old || (lowerBetter ? parseInt(val) < parseInt(old) : parseInt(val) > parseInt(old))) {
                localStorage.setItem(key, val); updateLB();
            }
        }

        // --- NAVIGATION ---
        let jActive = false, aimActive = false, bActive = false, birdActive = false;
        function openGame(id) {
            document.querySelectorAll('.game-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-'+id).classList.add('active');
            jActive = aimActive = bActive = birdActive = false;
        }

        // --- KLIK BIRD (LOW GRAVITY + COUNTDOWN) ---
        const birdCanvas = document.getElementById('birdCanvas');
        const birdCtx = birdCanvas.getContext('2d');
        let bird, pipes, birdScore;

        function prepBird() {
            document.getElementById('bird-ui').style.display = 'none';
            let count = 3;
            const cd = document.getElementById('bird-countdown');
            cd.innerText = count;
            const timer = setInterval(() => {
                count--;
                if(count > 0) cd.innerText = count;
                else {
                    cd.innerText = "";
                    clearInterval(timer);
                    startBird();
                }
            }, 1000);
        }

        function startBird() {
            birdActive = true; birdScore = 0;
            bird = { x: 50, y: 250, v: 0, r: 20 };
            pipes = [];
            loopBird();
        }

        const birdJump = () => { if(birdActive) bird.v = -4.5; }; // Gravità diminuita
        birdCanvas.addEventListener('mousedown', birdJump);
        birdCanvas.addEventListener('touchstart', (e) => { birdJump(); e.preventDefault(); }, {passive: false});
        window.addEventListener('keydown', e => { if(e.code === 'Space' && birdActive) birdJump(); });

        function loopBird() {
            if(!birdActive) return;
            birdCtx.clearRect(0,0,400,500);
            bird.v += 0.22; bird.y += bird.v; // Caduta più lenta

            if(Date.now() % 100 < 20 && (pipes.length === 0 || pipes[pipes.length-1].x < 220)) {
                let gap = 160;
                let topH = Math.random() * (250 - 100) + 50;
                pipes.push({ x: 400, topH: topH, gap: gap, passed: false });
            }

            pipes.forEach((p, i) => {
                p.x -= 2.2;
                birdCtx.fillStyle = "var(--primary)";
                birdCtx.fillRect(p.x, 0, 50, p.topH);
                birdCtx.fillRect(p.x, p.topH + p.gap, 50, 500);
                if(p.x < -50) pipes.splice(i, 1);
                if(bird.x + bird.r > p.x && bird.x - bird.r < p.x + 50) {
                    if(bird.y - bird.r < p.topH || bird.y + bird.r > p.topH + p.gap) birdActive = false;
                }
                if(!p.passed && p.x < bird.x) { p.passed = true; birdScore++; }
            });

            birdCtx.save(); birdCtx.beginPath(); birdCtx.arc(bird.x, bird.y, bird.r, 0, Math.PI*2); birdCtx.clip();
            if(img.complete) birdCtx.drawImage(img, bird.x - bird.r, bird.y - bird.r, bird.r*2, bird.r*2);
            birdCtx.restore();
            document.getElementById('bird-score').innerText = birdScore;

            if(bird.y > 500 || bird.y < 0 || !birdActive) {
                birdActive = false; document.getElementById('bird-ui').style.display = 'block';
                checkRecord('best-bird', birdScore);
            } else requestAnimationFrame(loopBird);
        }

        // --- KLIK JUMP ---
        const jCanvas = document.getElementById('jumpCanvas');
        const jCtx = jCanvas.getContext('2d');
        let player, platforms, jScore, touchX = null, keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);
        jCanvas.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; e.preventDefault(); }, {passive: false});
        jCanvas.addEventListener('touchmove', e => { touchX = e.touches[0].clientX; e.preventDefault(); }, {passive: false});
        jCanvas.addEventListener('touchend', () => { touchX = null; });

        function startJump() {
            jActive = true; jScore = 0;
            document.getElementById('jump-ui').style.display = 'none';
            player = { x: 180, y: 350, w: 40, h: 40, vy: -10 };
            platforms = [{ x: 140, y: 450, w: 120, h: 10 }];
            for(let i=1; i<6; i++) platforms.push({ x: Math.random()*320, y: 450 - (i*90), w: 75, h: 10 });
            loopJump();
        }

        function loopJump() {
            if(!jActive) return;
            jCtx.clearRect(0,0,400,500);
            player.vy += 0.3; player.y += player.vy;
            if(keys['ArrowLeft']) player.x -= 6; if(keys['ArrowRight']) player.x += 6;
            if(touchX !== null) {
                const rect = jCanvas.getBoundingClientRect();
                const x = (touchX - rect.left) * (400 / rect.width);
                if(x < player.x + 20) player.x -= 7; else player.x += 7;
            }
            if(player.x < -20) player.x = 400; if(player.x > 400) player.x = -20;
            platforms.forEach(p => {
                jCtx.fillStyle = "white"; jCtx.fillRect(p.x, p.y, p.w, p.h);
                if(player.vy > 0 && player.x + 30 > p.x && player.x < p.x + p.w && player.y + 40 > p.y && player.y + 40 < p.y + 15) player.vy = -10;
                if(player.y < 200) {
                    let diff = 200 - player.y; player.y = 200;
                    platforms.forEach(p2 => { p2.y += diff; if(p2.y > 500) { p2.y = 0; p2.x = Math.random()*320; jScore += 10; } });
                }
            });
            if(img.complete) jCtx.drawImage(img, player.x, player.y, 40, 40);
            document.getElementById('jump-score').innerText = jScore;
            if(player.y > 550) { jActive = false; document.getElementById('jump-ui').style.display = 'block'; checkRecord('best-jump', jScore); }
            else requestAnimationFrame(loopJump);
        }

        // --- KLIK BALL ---
        const bCanvas = document.getElementById('ballCanvas');
        const bCtx = bCanvas.getContext('2d');
        let ball, paddle, bScore;
        function startBall() {
            bActive = true; bScore = 0;
            ball = { x: 200, y: 100, vx: 3, vy: 3, r: 25 };
            paddle = { x: 150, w: 100 };
            document.getElementById('ball-ui').style.display = 'none';
            loopBall();
        }
        const bMove = (cx) => { const rect = bCanvas.getBoundingClientRect(); paddle.x = ((cx - rect.left) * (400 / rect.width)) - paddle.w/2; };
        bCanvas.addEventListener('mousemove', e => bMove(e.clientX));
        bCanvas.addEventListener('touchmove', e => { bMove(e.touches[0].clientX); e.preventDefault(); }, {passive: false});
        function loopBall() {
            if(!bActive) return;
            bCtx.clearRect(0,0,400,500);
            ball.x += ball.vx; ball.y += ball.vy;
            if(ball.x < 25 || ball.x > 375) ball.vx *= -1;
            if(ball.y < 25) ball.vy *= -1;
            if(ball.vy > 0 && ball.y > 440 && ball.x > paddle.x && ball.x < paddle.x + paddle.w) { ball.vy *= -1.05; bScore++; }
            bCtx.fillStyle = "var(--primary)"; bCtx.fillRect(paddle.x, 465, paddle.w, 15);
            bCtx.save(); bCtx.beginPath(); bCtx.arc(ball.x, ball.y, 25, 0, Math.PI*2); bCtx.clip();
            if(img.complete) bCtx.drawImage(img, ball.x-25, ball.y-25, 50, 50);
            bCtx.restore();
            document.getElementById('ball-score').innerText = bScore;
            if(ball.y > 500) { bActive = false; document.getElementById('ball-ui').style.display = 'block'; checkRecord('best-ball', bScore); }
            else requestAnimationFrame(loopBall);
        }

        // --- KLIK AIM ---
        let aimTimer;
        function startAim() {
            aimActive = true; aimScore = 0;
            const dur = document.getElementById('aim-duration');
            let timeLeft = parseInt(dur.value);
            dur.style.display = 'none';
            document.getElementById('aim-timer-display').style.display = 'inline';
            document.getElementById('aim-timer').innerText = timeLeft;
            document.getElementById('aim-score').innerText = 0;
            document.getElementById('aim-start-btn').style.display = 'none';
            const t = document.getElementById('target'); t.style.display = 'block';
            const move = () => { t.style.left = Math.random()*310+"px"; t.style.top = Math.random()*260+"px"; };
            move();
            t.onclick = () => { if(aimActive){ aimScore++; document.getElementById('aim-score').innerText = aimScore; move(); } };
            aimTimer = setInterval(() => {
                timeLeft--; document.getElementById('aim-timer').innerText = timeLeft;
                if(timeLeft <= 0) { clearInterval(aimTimer); aimActive = false; t.style.display = 'none'; document.getElementById('aim-start-btn').style.display = 'block'; document.getElementById('aim-timer-display').style.display = 'none'; dur.style.display = 'inline'; checkRecord('best-aim', aimScore); }
            }, 1000);
        }

        // --- KLIK REACT ---
        let rState = "idle", rStart, rWait;
        function handleReaction() {
            const a = document.getElementById('reaction-area');
            if(rState === "idle" || rState === "end") {
                rState = "waiting"; a.style.background = "var(--danger)"; a.innerText = "ATTENDI...";
                document.getElementById('reaction-result').innerText = "";
                rWait = setTimeout(() => { rState = "go"; a.style.background = "var(--success)"; a.innerText = "CLICCA ORA!"; rStart = Date.now(); }, Math.random()*3000+2000);
            } else if(rState === "waiting") { clearTimeout(rWait); rState = "idle"; a.style.background = "var(--primary)"; a.innerText = "ANTICIPATO!"; }
            else if(rState === "go") {
                const ms = Date.now() - rStart; rState = "end"; a.style.background = "var(--primary)";
                a.innerText = "RIPROVA"; document.getElementById('reaction-result').innerText = ms + "ms"; checkRecord('best-reaction', ms, true);
            }
        }
    </script>
</body>
</html>
