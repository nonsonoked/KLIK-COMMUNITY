<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>KLIK COMMUNITY | Candidature</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Luckiest+Guy&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #a855f7;
            --accent: #d946ef;
            --bg: #05000a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        * { 
            box-sizing: border-box; 
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
        }

        body {
            margin: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg); 
            color: white; 
            min-height: 100vh;
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* SFONDO ANIMATO ORIGINALE */
        body::before {
            content: ""; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(168, 85, 247, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(217, 70, 239, 0.12) 0%, transparent 40%);
            z-index: -1; 
            animation: bgMove 8s infinite alternate;
        }
        @keyframes bgMove { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* SUTTURA SCHEDA */
        .container { 
            width: 100%; 
            max-width: 1100px; 
            animation: slideUp 0.5s ease forwards; 
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card { 
            background: var(--glass); 
            border: 1px solid var(--glass-border); 
            border-radius: 30px; 
            padding: 40px; 
            backdrop-filter: blur(20px); 
        }

        /* PULSANTE TORNA INDIETRO */
        .back-link {
            display: inline-block;
            text-decoration: none;
            color: var(--primary); 
            margin-bottom: 20px; 
            font-weight: 800;
            cursor: pointer;
        }
        .back-link:hover {
            color: white;
            transform: translateX(-5px);
        }

        .title {
            font-family: 'Luckiest Guy', cursive; 
            text-align: center;
            font-size: 40px; 
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        iframe {
            width: 100%; 
            height: 600px; 
            border-radius: 20px; 
            background: white; 
            border: none;
        }

        @media (max-width: 600px) {
            .card { padding: 20px; }
            .title { font-size: 30px; }
            iframe { height: 500px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <a href="index.html" class="back-link">← TORNA ALLA HOME</a>
            
            <h1 class="title">📝 CANDIDATURE</h1>
            
            <iframe src="https://forms.gle/zcUjxDvXhrkdHw7q9" title="Modulo Candidature"></iframe>
        </div>
    </div>

</body>
</html>
